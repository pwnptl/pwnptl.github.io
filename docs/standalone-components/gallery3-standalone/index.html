<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery3 - Photo Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gallery3-container" id="gallery3-container">
    <!-- Navigation Row with Previous Button, Items, and Next Button -->
    <div class="gallery3-nav-row">
      <!-- Previous Button -->
      <button id="gallery3-prev-btn" class="gallery3-nav-btn gallery3-prev-btn" aria-label="Previous photos" style="display: none;">
        <i class="fas fa-chevron-left"></i>
      </button>

      <!-- Gallery Items -->
      <div class="gallery3-items-wrapper">
        <div class="gallery3-items" id="gallery3-items">
          <!-- Items will be generated by JavaScript -->
        </div>
      </div>

      <!-- Next Button -->
      <button id="gallery3-next-btn" class="gallery3-nav-btn gallery3-next-btn" aria-label="Next photos" style="display: none;">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>

  <!-- Zoom Modal -->
  <div id="gallery3-zoom-overlay" class="gallery3-zoom-overlay" style="display: none;">
    <div class="gallery3-zoom-content" id="gallery3-zoom-content">
      <button class="gallery3-zoom-close" id="gallery3-zoom-close" aria-label="Close zoom">
        <i class="fas fa-times"></i>
      </button>
      <img id="gallery3-zoom-image" class="gallery3-zoom-image" alt="">
      <p id="gallery3-zoom-caption" class="gallery3-zoom-caption" style="display: none;"></p>
    </div>
  </div>

  <script src="gallery3.js"></script>
</body>
</html>
