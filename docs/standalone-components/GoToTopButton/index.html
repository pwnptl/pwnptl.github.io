<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoToTopButton - Standalone</title>
</head>
<body>
  <!-- Add your main content container -->
  <div id="app-main-content" style="height: 100vh; overflow-y: auto; background: #f5f5f5;">
    <section style="height: 100vh; padding: 2rem; background: #fff; border-bottom: 1px solid #ddd;">
      <h2>Section 1</h2>
      <p>Scroll down to see the GoToTopButton in action</p>
    </section>
    <section style="height: 100vh; padding: 2rem; background: #f0f0f0; border-bottom: 1px solid #ddd;">
      <h2>Section 2</h2>
    </section>
    <section style="height: 100vh; padding: 2rem; background: #fff; border-bottom: 1px solid #ddd;">
      <h2>Section 3</h2>
    </section>
  </div>

  <!-- Mount point for GoToTopButton -->
  <div id="go-to-top-button-root"></div>

  <script type="module">
    import GoToTopButton from './GoToTopButton.js';

    document.addEventListener('DOMContentLoaded', () => {
      new GoToTopButton({
        rootSelector: '#go-to-top-button-root',
        isEnabled: true,
        scrollContainerId: 'app-main-content',
      });
    });
  </script>
</body>
</html>
