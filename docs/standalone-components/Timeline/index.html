<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline - Standalone</title>
</head>
<body>
  <div id="timeline-root"></div>

  <script type="module">
    import Timeline from './Timeline.js';

    document.addEventListener('DOMContentLoaded', () => {
      const timelineData = [
        {
          id: 1,
          date: 'Jan 2023 - Present',
          title: 'Senior Developer',
          company: 'Tech Company Inc',
          description: 'Led development of core features and mentored junior developers.',
        },
        {
          id: 2,
          date: 'Jun 2021 - Dec 2022',
          title: 'Full Stack Developer',
          company: 'Startup XYZ',
          description: 'Built scalable web applications using React and Node.js.',
        },
        {
          id: 3,
          date: 'Jan 2020 - May 2021',
          title: 'Junior Developer',
          company: 'Web Agency',
          description: 'Developed responsive websites and fixed bugs in legacy systems.',
        },
      ];

      new Timeline({
        rootSelector: '#timeline-root',
        items: timelineData,
      });
    });
  </script>
</body>
</html>
